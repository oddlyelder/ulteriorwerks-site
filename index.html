<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ULTERIOR | WERKS</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    @font-face {
      font-family: 'Steelfish';
      src: url('SteelfishEb.otf') format('opentype');
      font-weight: 800;
      font-display: block;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
    }
    .hero {
      height: 100vh;
      width: 100vw;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
      padding-left: 3vw;
      padding-bottom: 4vh;
    }
    .bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
    }
    .wordmark {
      font-family: 'Steelfish', sans-serif;
      font-weight: 800;
      font-size: clamp(8vw, 10vw, 14vw);
      color: #F5D372;
      letter-spacing: 0.02em;
      line-height: 1;
      white-space: nowrap;
      position: relative;
      z-index: 10;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }

/* SECOND SECTION BACKGROUND (static atmosphere, shadow-ready) */
.section-two {
  position: relative;
  min-height: 100vh;
  overflow: hidden;
  isolation: isolate;
  background:
    /* top smoke field (large, soft, asymmetric) */
    radial-gradient(
      ellipse 140% 85% at 78% -6%,
      rgba(12, 10, 9, 0.55) 0%,
      rgba(14, 12, 10, 0.28) 34%,
      rgba(16, 13, 11, 0.10) 62%,
      rgba(16, 13, 11, 0.00) 88%
    ),
    radial-gradient(
      ellipse 120% 70% at 28% -10%,
      rgba(10, 9, 8, 0.42) 0%,
      rgba(12, 10, 9, 0.20) 38%,
      rgba(14, 12, 10, 0.08) 66%,
      rgba(14, 12, 10, 0.00) 90%
    ),

    /* restrained warm source near upper-right */
    radial-gradient(
      circle at 86% 12%,
      rgba(186, 132, 82, 0.20) 0%,
      rgba(186, 132, 82, 0.10) 14%,
      rgba(186, 132, 82, 0.04) 28%,
      rgba(186, 132, 82, 0.00) 44%
    ),

    /* implied diagonal force lane (radial, not a hard linear band) */
    radial-gradient(
      ellipse 120% 70% at 92% 8%,
      rgba(7, 6, 5, 0.34) 0%,
      rgba(9, 8, 7, 0.18) 30%,
      rgba(12, 10, 9, 0.08) 58%,
      rgba(12, 10, 9, 0.00) 84%
    ),

    /* cool-brown smoke lift for dimensional balance */
    radial-gradient(
      ellipse at 20% 78%,
      rgba(108, 100, 88, 0.07) 0%,
      rgba(108, 100, 88, 0.03) 24%,
      rgba(108, 100, 88, 0.00) 48%
    ),

    /* rich bronze/burnt lower field */
    linear-gradient(
      to bottom,
      #17130f 0%,
      #1f1915 24%,
      #28211b 55%,
      #312821 82%,
      #382d24 100%
    );
}

/* organic smoke/falloff seam from hero into section two */
.section-two::before {
  content: "";
  position: absolute;
  top: -18vh;
  left: -8vw;
  width: 116vw;
  height: 58vh;
  z-index: 1;
  pointer-events: none;
  filter: blur(0.6px);
  background:
    radial-gradient(
      ellipse 150% 95% at 70% -10%,
      rgba(18, 14, 12, 0.42) 0%,
      rgba(18, 14, 12, 0.22) 34%,
      rgba(18, 14, 12, 0.08) 62%,
      rgba(18, 14, 12, 0.00) 92%
    ),
    radial-gradient(
      ellipse 130% 85% at 34% -18%,
      rgba(10, 9, 8, 0.34) 0%,
      rgba(12, 10, 9, 0.18) 38%,
      rgba(14, 12, 10, 0.08) 66%,
      rgba(14, 12, 10, 0.00) 92%
    ),
    radial-gradient(
      ellipse 120% 80% at 52% 6%,
      rgba(20, 16, 13, 0.18) 0%,
      rgba(20, 16, 13, 0.08) 44%,
      rgba(20, 16, 13, 0.00) 78%
    );
}

/* restrained surface grain for material feel */
.section-two::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  opacity: 0.07;
  background-image:
    repeating-linear-gradient(
      8deg,
      rgba(255,255,255,0.012) 0px,
      rgba(255,255,255,0.012) 1px,
      transparent 1px,
      transparent 4px
    );
  mix-blend-mode: soft-light;
}

/* hook: future animated atmospheric modulation layer */
.section-two-atmosphere {
  position: absolute;
  inset: 0;
  z-index: 3;
  pointer-events: none;
}

/* hook: future blurred robot shadow path layer */
.section-two-shadow-path {
  position: absolute;
  inset: 0;
  z-index: 4;
  pointer-events: none;
}
  </style>
</head>
<body>
  <section class="hero">
    <img class="bg" src="evil-robot.png" alt="">
    <h1 class="wordmark">ulterior|werks</h1>
  </section>
  <section class="section-two">
    <div class="section-two-atmosphere" aria-hidden="true"></div>
    <div class="section-two-shadow-path" aria-hidden="true"></div>
  </section>
</body>
</html>
