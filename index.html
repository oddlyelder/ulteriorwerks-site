<!doctype html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ulterior Werks LLC</title>
  <style>
    :root {
      --bg: #0e0e0f;
      --text-primary: #efefef;
      --text-muted: #b8b8b8;
      --text-faint: #4a4845;
      --accent-1: #E62231;
      --accent-2: #00C2B2;
      --font-display: 'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
      padding: 0 24px;
      text-align: center;
    }

    .wordmark {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      margin-top: 40px;
      margin-bottom: 0;
    }

    .tagline {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1.2;
      color: var(--text-primary);
      margin-top: 24px;
      margin-bottom: 24px;
    }

    .products-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 0 0 12px;
    }

    .product-link {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.16em;
      color: var(--accent-1);
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .product-link:hover {
      opacity: 0.7;
    }

    .contact {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 40px;
    }

    .contact a {
      color: var(--text-muted);
      text-decoration: none;
    }

    .contact a:hover {
      color: var(--text-muted);
    }

    .product-line {
      margin: 0;
    }

    .footer {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-faint);
      margin-top: 32px;
      padding-bottom: 32px;
    }
  </style>
</head>
<body>
  <main class="page">
    <p class="wordmark">ULTERIOR WERKS LLC</p>

    <p class="tagline">They didn't wait for your permission.<br>What's already happening never does.</p>

    <div>
      <p class="products-label">PRODUCTS</p>
      <p class="product-line">
        <a class="product-link" href="https://nytjar.com" target="_blank" rel="noopener noreferrer">NYTJAR</a>
      </p>
    </div>

    <p class="contact">
      <a href="mailto:hello@ulteriorwerks.com">hello@ulteriorwerks.com</a>
    </p>

    <p class="footer">© 2026 Ulterior Werks LLC</p>
  </main>
</body>
</html>
