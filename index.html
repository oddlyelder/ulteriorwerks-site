<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTERIOR | WERKS</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
@font-face {
  font-family: 'Steelfish';
  src: url('SteelfishEb.otf') format('opentype');
  font-weight: 800;
  font-display: block;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  overflow-x: hidden;
  overflow-y: auto;
}
.hero {
  height: 100vh;
  width: 100vw;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: flex-start;
  padding-left: 3vw;
  padding-bottom: 4vh;
}
.bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: 0;
}
.wordmark {
  font-family: 'Steelfish', sans-serif;
  font-weight: 800;
  font-size: clamp(8vw, 10vw, 14vw);
  color: #F5D372;
  letter-spacing: 0.02em;
  line-height: 1;
  white-space: nowrap;
  position: relative;
  z-index: 10;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
}

.manifesto {
  height: 100vh;
  width: 100vw;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  transform: scaleY(-1);
}

.manifesto-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: 0;
}

.manifesto-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(114, 148, 245, 0.15);
  z-index: 1;
}

.manifesto-static {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 2;
  opacity: 0.25;
  pointer-events: none;
}

.manifesto-copy {
  position: relative;
  z-index: 3;
  padding: 8vh 8vw;
  max-width: 900px;
}

.manifesto-line {
  font-family: 'Steelfish', sans-serif;
  font-weight: 800;
  font-size: clamp(2rem, 3.5vw, 4rem);
  color: #F0EDE6;
  line-height: 1.3;
  margin-bottom: 1.5em;
  position: relative;
  display: block;
}

.manifesto-line::before {
  content: attr(data-text);
  position: absolute;
  left: -2px;
  top: 0;
  color: rgba(255, 0, 0, 0.5);
  z-index: -1;
}

.manifesto-line::after {
  content: attr(data-text);
  position: absolute;
  left: 2px;
  top: 0;
  color: rgba(0, 100, 255, 0.5);
  z-index: -1;
}
</style>
</head>
<body>
<section class="hero">
  <img class="bg" src="evil-robot.png" alt="">
  <h1 class="wordmark">ulterior|werks</h1>
</section>
<section class="manifesto">
  <img class="manifesto-bg" src="evil-robot.png" alt="">
  <div class="manifesto-overlay"></div>
  <canvas class="manifesto-static" id="manifesto-static"></canvas>
  <div class="manifesto-copy">
    <span class="manifesto-line" 
      data-text="placeholder line one.">
      placeholder line one.
    </span>
    <span class="manifesto-line" 
      data-text="placeholder line two.">
      placeholder line two.
    </span>
    <span class="manifesto-line" 
      data-text="placeholder line three.">
      placeholder line three.
    </span>
    <span class="manifesto-line" 
      data-text="placeholder line four.">
      placeholder line four.
    </span>
  </div>
</section>
<script>
const mCanvas = document.getElementById('manifesto-static');
const mCtx = mCanvas.getContext('2d');

function resizeCanvas() {
  mCanvas.width = mCanvas.offsetWidth;
  mCanvas.height = mCanvas.offsetHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawStatic() {
  const w = mCanvas.width;
  const h = mCanvas.height;
  const imageData = mCtx.createImageData(w, h);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const val = Math.random() > 0.5 ? 255 : 0;
    data[i] = val;
    data[i+1] = val;
    data[i+2] = val;
    data[i+3] = Math.random() * 200;
  }
  mCtx.putImageData(imageData, 0, 0);
  if (Math.random() > 0.92) {
    const y = Math.random() * h;
    const ht = 1 + Math.random() * 4;
    const shift = (Math.random() - 0.5) * 12;
    mCtx.drawImage(mCanvas, 0, y, w, ht, shift, y, w, ht);
  }
  requestAnimationFrame(drawStatic);
}
drawStatic();
</script>
</body>
</html>
