<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTERIOR | WERKS</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
@font-face {
  font-family: 'Steelfish';
  src: url('SteelfishEb.otf') format('opentype');
  font-weight: 800;
  font-display: block;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  overflow-x: hidden;
  overflow-y: auto;
}
.hero {
  height: 100vh;
  width: 100vw;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: flex-start;
  padding-left: 3vw;
  padding-bottom: 4vh;
}
.bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: 0;
}
.wordmark {
  font-family: 'Steelfish', sans-serif;
  font-weight: 800;
  font-size: clamp(8vw, 10vw, 14vw);
  color: #F5D372;
  letter-spacing: 0.02em;
  line-height: 1;
  white-space: nowrap;
  position: relative;
  z-index: 10;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
}

.manifesto {
  height: 100vh;
  width: 100vw;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: flex-start;
}

.manifesto-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: 0;
}

.manifesto-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(41, 48, 77, 0.88);
  z-index: 1;
}
</style>
</head>
<body>
<section class="hero">
  <img class="bg" src="evil-robot.png" alt="">
  <h1 class="wordmark">ulterior|werks</h1>
</section>
<section class="manifesto">
  <img class="manifesto-bg" src="evil-robot.png" alt="">
  <div class="manifesto-overlay"></div>
</section>
</body>
</html>
