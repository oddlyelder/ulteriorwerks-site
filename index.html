<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ULTERIOR | WERKS</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Underdog&display=swap" rel="stylesheet">
  <style>
@font-face {
  font-family: 'Steelfish';
  src: url('SteelfishEb.otf') format('opentype');
  font-weight: 800;
  font-display: block;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  overflow-x: hidden;
  overflow-y: auto;
}
.hero {
  height: 100vh;
  width: 100vw;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: flex-start;
  padding-left: 3vw;
  padding-bottom: 4vh;
}
.bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: 0;
}
.wordmark {
  font-family: 'Steelfish', sans-serif;
  font-weight: 800;
  font-size: clamp(8vw, 10vw, 14vw);
  color: #F5D372;
  letter-spacing: 0.02em;
  line-height: 1;
  white-space: nowrap;
  position: relative;
  z-index: 10;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
}
.haiku {
  position: absolute;
  top: 4vh;
  right: 3vw;
  z-index: 10;
  text-align: right;
  font-family: 'Underdog', serif;
  font-weight: 400;
  font-size: 22px;
  color: #7294F5;
  line-height: 1.8;
  pointer-events: none;
}
.manifesto-wrap {
  position: relative;
  width: 100vw;
  height: 100vh;
}
.manifesto {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}
.manifesto-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: 0;
  transform: scaleY(-1);
}
.manifesto-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(114, 148, 245, 0.15);
  z-index: 1;
}
.manifesto-static {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 2;
  opacity: 0.25;
  pointer-events: none;
}
.manifesto-copy {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 3;
  padding: 8vh 8vw;
  max-width: 900px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.manifesto-line {
  font-family: 'Steelfish', sans-serif;
  font-weight: 800;
  font-size: clamp(1rem, 2vw, 2.2rem);
  color: #F0EDE6;
  line-height: 1.3;
  margin-bottom: 1.5em;
  position: relative;
  display: block;
}
.manifesto-line::before {
  content: attr(data-text);
  position: absolute;
  left: -4px;
  top: 0;
  color: rgba(255, 0, 0, 0.7);
  z-index: 1;
  pointer-events: none;
}
.manifesto-line::after {
  content: attr(data-text);
  position: absolute;
  left: 4px;
  top: 0;
  color: rgba(0, 100, 255, 0.7);
  z-index: 1;
  pointer-events: none;
}
  </style>
</head>
<body>

  <section class="hero">
    <img class="bg" src="evil-robot.png" alt="">
    <h1 class="wordmark">ulterior|werks</h1>
    <div class="haiku">
      what should be private<br>
      has become raw data in<br>
      the AI machine
    </div>
  </section>
</body>
</html>
