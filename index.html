<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTERIOR | WERKS</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  background: #0D0B0B;
  overflow: hidden;
}
.hero {
  height: 100vh;
  width: 100vw;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: flex-start;
  padding-top: 18vh;
}
.wordmark {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: clamp(10vw, 16vw, 18vw);
  color: #CC1111;
  letter-spacing: 0.02em;
  line-height: 1;
  white-space: nowrap;
  margin-left: -2.5vw;
  position: relative;
  z-index: 10;
}
.streams {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}
.stream {
  position: absolute;
  left: 0;
  white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 300;
  font-size: 13px;
  color: #CC1111;
  letter-spacing: -0.02em;
  line-height: 1.2;
  text-shadow: 0 0 8px rgba(204, 17, 17, 0.6), 0 0 20px rgba(204, 17, 17, 0.3);
  -webkit-mask-image: linear-gradient(to right, 
    rgba(0,0,0,0) 0%, 
    rgba(0,0,0,1) 8%, 
    rgba(0,0,0,1) 70%, 
    rgba(0,0,0,0) 100%);
  mask-image: linear-gradient(to right, 
    rgba(0,0,0,0) 0%, 
    rgba(0,0,0,1) 8%, 
    rgba(0,0,0,1) 70%, 
    rgba(0,0,0,0) 100%);
}
@keyframes glitch {
  0%   { transform: translateX(0); }
  20%  { transform: translateX(-3px); clip-path: inset(20% 0 60% 0); }
  21%  { transform: translateX(3px); clip-path: inset(20% 0 60% 0); }
  22%  { transform: translateX(0); clip-path: none; }
  60%  { transform: translateX(0); }
  80%  { transform: translateX(2px); clip-path: inset(55% 0 30% 0); }
  81%  { transform: translateX(-2px); clip-path: inset(55% 0 30% 0); }
  82%  { transform: translateX(0); clip-path: none; }
  100% { transform: translateX(0); }
}
.glitching {
  animation: glitch 0.15s steps(1) forwards;
}
</style>
</head>
<body>
<section class="hero">
  <div class="streams" id="streams"></div>
  <h1 class="wordmark">ULTERIOR|WERKS</h1>
</section>
<script>
const fragments = [
  'refusal',
  'without traceability',
  'off the record',
  'continuous extraction',
  'only the beginning',
  'refusal',
  'without traceability',
  'off the record',
  'continuous extraction',
  'only the beginning'
];

const container = document.getElementById('streams');
const numStreams = 28;
const usedRows = [];

for (let i = 0; i < numStreams; i++) {
  const stream = document.createElement('div');
  stream.className = 'stream';

  const text = Array.from({length: 12}, function() {
    return fragments[Math.floor(Math.random() * fragments.length)];
  }).join('   ·   ');

  stream.textContent = text;

  let top;
  let attempts = 0;
  do {
    top = 2 + Math.random() * 94;
    attempts++;
  } while (
    attempts < 30 &&
    usedRows.some(function(r) { return Math.abs(r - top) < 1.8; })
  );
  usedRows.push(top);

  const duration = 18 + Math.random() * 24;
  const delay = Math.random() * -30;
  const opacity = 0.15 + Math.random() * 0.15;

  stream.style.top = top + 'vh';
  stream.style.opacity = opacity;
  stream.style.animation = 'none';

  container.appendChild(stream);

  let position = -800;
  const speed = (window.innerWidth + 1600) / (duration * 60);

  function animate(el, pos, spd) {
    let p = pos;
    function step() {
      p += spd;
      if (p > window.innerWidth + 800) p = -800;
      el.style.transform = 'translateX(' + p + 'px)';
      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  animate(stream, position + delay * speed, speed);
}

function triggerGlitch() {
  const streams = document.querySelectorAll('.stream');
  const count = 2 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    const el = streams[Math.floor(Math.random() * streams.length)];
    el.classList.add('glitching');
    setTimeout(function() {
      el.classList.remove('glitching');
    }, 200);
  }
  setTimeout(triggerGlitch, 4000 + Math.random() * 8000);
}

setTimeout(triggerGlitch, 3000);
</script>
</body>
</html>
