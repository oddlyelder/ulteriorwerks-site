<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ULTERIOR | WERKS</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    @font-face {
      font-family: 'Steelfish';
      src: url('SteelfishEb.otf') format('opentype');
      font-weight: 800;
      font-display: block;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
    }
    .hero {
      height: 100vh;
      width: 100vw;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
      padding-left: 3vw;
      padding-bottom: 4vh;
    }
    .bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
    }
    .wordmark {
      font-family: 'Steelfish', sans-serif;
      font-weight: 800;
      font-size: clamp(8vw, 10vw, 14vw);
      color: #F5D372;
      letter-spacing: 0.02em;
      line-height: 1;
      white-space: nowrap;
      position: relative;
      z-index: 10;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }

/* SECOND SECTION BACKGROUND (static, no animation yet) */

.section-two {
  position: relative;
  min-height: 100vh;
  overflow: hidden;
  background:
    /* warm glow near shadow source (top-right) */
    radial-gradient(
      circle at 86% 10%,
      rgba(176, 128, 84, 0.14) 0%,
      rgba(176, 128, 84, 0.08) 14%,
      rgba(176, 128, 84, 0.03) 28%,
      rgba(176, 128, 84, 0.00) 42%
    ),

    /* broad diagonal dark sweep where shadow path will travel */
    linear-gradient(
      135deg,
      rgba(0,0,0,0.22) 8%,
      rgba(0,0,0,0.12) 28%,
      rgba(0,0,0,0.06) 46%,
      rgba(0,0,0,0.02) 62%,
      rgba(0,0,0,0.00) 76%
    ),

    /* subtle cool lift lower-left for balance */
    radial-gradient(
      circle at 18% 78%,
      rgba(120, 126, 140, 0.05) 0%,
      rgba(120, 126, 140, 0.02) 22%,
      rgba(120, 126, 140, 0.00) 44%
    ),

    /* base material tone */
    linear-gradient(
      to bottom,
      #171310 0%,
      #211c18 32%,
      #2a241f 68%,
      #302923 100%
    );
}

/* optional texture layer */
.section-two::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.08;
  background-image:
    repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.015) 0px,
      rgba(255,255,255,0.015) 1px,
      transparent 1px,
      transparent 3px
    );
  mix-blend-mode: soft-light;
}

/* optional top transition from hero section */
.section-two::after {
  content: "";
  position: absolute;
  top: -18vh;
  left: 0;
  width: 100%;
  height: 26vh;
  pointer-events: none;
  background: linear-gradient(
    to bottom,
    rgba(10,10,10,0.00) 0%,
    rgba(18,16,14,0.42) 45%,
    rgba(23,19,16,0.95) 100%
  );
}
  </style>
</head>
<body>
  <section class="hero">
    <img class="bg" src="evil-robot.png" alt="">
    <h1 class="wordmark">ulterior|werks</h1>
  </section>
</body>
</html>
