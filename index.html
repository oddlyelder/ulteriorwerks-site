<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTERIOR | WERKS</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
@font-face {
  font-family: 'Steelfish';
  src: url('Steelfish Eb.otf') format('opentype');
  font-weight: 800;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}
.hero {
  height: 100vh;
  width: 100vw;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: flex-start;
  padding-left: 3vw;
  gap: 40px;
}
.bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: 0;
}
.wordmark {
  font-family: 'Steelfish', sans-serif;
  font-weight: 800;
  font-size: clamp(10vw, 9vw, 16vw);
  color: #778C60;
  letter-spacing: 0.02em;
  line-height: 1;
  white-space: nowrap;
  position: relative;
  z-index: 10;
  text-shadow: 0 2px 40px rgba(0,0,0,0.9);
}
</style>
</head>
<body>
<section class="hero">
  <img class="bg" src="evil-robot.png" alt="">
  <h1 class="wordmark">ulterior|werks</h1>
</section>
</body>
</html>
